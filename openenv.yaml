spec_version: 1
name: schema-migration-openenv
type: environment
runtime:
  type: docker
  dockerfile: Dockerfile
app:
  port: 7860
  health_check: /health
  reset_endpoint: /reset
  step_endpoint: /step
  state_endpoint: /state
tasks:
  - name: add_columns
    difficulty: easy
    description: Add three new columns to the products table with correct types and defaults.
  - name: normalize_orders
    difficulty: medium
    description: Normalize a denormalized orders table into customers, products, and orders tables.
  - name: refactor_employees
    difficulty: hard
    description: Refactor a legacy employee_records table into a normalized schema with a compatibility view.