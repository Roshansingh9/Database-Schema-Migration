spec_version: 1
name: schema-migration-openenv
type: environment
runtime:
  type: docker
  dockerfile: Dockerfile
app:
  port: 7860
tasks:
  - name: add_columns
    difficulty: easy
    grader: graders.schema_graders:AddColumnsGrader
  - name: normalize_orders
    difficulty: medium
    grader: graders.schema_graders:NormalizeOrdersGrader
  - name: refactor_employees
    difficulty: hard
    grader: graders.schema_graders:RefactorEmployeesGrader
